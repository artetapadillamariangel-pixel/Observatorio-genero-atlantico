<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa de Representación Política Femenina — Atlántico</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root {
  --pink-1: #FCE9F1;
  --pink-2: #F8C9DD;
  --pink-3: #F391B9;
  --pink-4: #C24B7E;
  --pink-dark: #8E2F58;
  --purple: #6B3FA0;
  --text-dark: #2B1A3D;
  --gray: #6B6B7B;
  --bg: #FAF8FB;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg);
}
.map-wrap {
  position: relative;
  width: 100%;
  max-width: 1000px;
  margin: 0 auto;
  background: #fff;
  border-radius: 20px;
  box-shadow: 0 4px 28px rgba(107,63,160,0.10);
  border: 1px solid rgba(107,63,160,0.08);
  padding: 28px 24px 24px;
  overflow: hidden;
}
.map-header {
  text-align: center;
  margin-bottom: 6px;
}
.map-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-dark);
  letter-spacing: 0.2px;
}
.map-subtitle {
  font-size: 12.5px;
  color: var(--gray);
  margin-top: 4px;
}
.map-controls {
  position: absolute;
  top: 24px;
  right: 24px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 5;
}
.map-btn {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: #fff;
  border: 1px solid rgba(107,63,160,0.15);
  color: var(--pink-dark);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.06);
  transition: background .15s, transform .15s;
  user-select: none;
}
.map-btn:hover { background: var(--pink-1); transform: translateY(-1px); }
.map-btn:active { transform: translateY(0); }

#mapa-svg-container {
  width: 100%;
  cursor: grab;
}
#mapa-svg-container:active { cursor: grabbing; }

.municipio-path {
  stroke: #ffffff;
  stroke-width: 1.1px;
  transition: filter 0.18s ease, stroke-width 0.18s ease;
  cursor: pointer;
}
.municipio-path:hover {
  filter: brightness(0.92);
  stroke: var(--pink-dark);
  stroke-width: 2px;
}
.municipio-sin-dato {
  fill: #ECE9F0 !important;
  stroke: #ffffff;
}

.muni-label {
  font-size: 7.6px;
  font-weight: 600;
  fill: var(--text-dark);
  pointer-events: none;
  text-anchor: middle;
  paint-order: stroke;
  stroke: #ffffff;
  stroke-width: 2.6px;
  stroke-linejoin: round;
  opacity: 0.92;
}
.muni-label-bquilla {
  font-size: 8.6px;
  font-weight: 700;
}

.star-icon {
  pointer-events: none;
}

/* Tooltip */
.tooltip {
  position: absolute;
  pointer-events: none;
  background: #ffffff;
  border-radius: 12px;
  box-shadow: 0 8px 28px rgba(43,26,61,0.18);
  border: 1px solid rgba(107,63,160,0.10);
  padding: 14px 16px;
  min-width: 210px;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity .15s ease, transform .15s ease;
  z-index: 50;
}
.tooltip.visible { opacity: 1; transform: translateY(0); }
.tooltip-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 2px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.tooltip-title .tt-star { color: var(--pink-4); font-size: 12px; }
.tooltip-divider {
  height: 1px;
  background: rgba(107,63,160,0.10);
  margin: 8px 0;
}
.tooltip-section-label {
  font-size: 9.5px;
  font-weight: 700;
  color: var(--gray);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}
.tooltip-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-size: 12.5px;
  color: var(--text-dark);
  margin-bottom: 3px;
}
.tooltip-row .val {
  font-weight: 700;
  color: var(--pink-dark);
}
.tooltip-alcaldia {
  font-size: 12.5px;
  color: var(--text-dark);
  font-weight: 600;
}
.tooltip-leadership {
  margin-top: 8px;
  background: var(--pink-1);
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 11px;
  color: var(--pink-dark);
  font-weight: 600;
  line-height: 1.35;
}
.tooltip-nodata {
  font-size: 11.5px;
  color: var(--gray);
  font-style: italic;
}

/* Leyenda */
.legend-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  gap: 18px;
  margin-top: 14px;
  padding-top: 16px;
  border-top: 1px solid rgba(107,63,160,0.08);
}
.legend-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-dark);
  text-transform: uppercase;
  letter-spacing: 0.4px;
  width: 100%;
  text-align: center;
  margin-bottom: 2px;
}
.legend-scale {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
  justify-content: center;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--gray);
}
.legend-swatch {
  width: 14px; height: 14px;
  border-radius: 4px;
  flex-shrink: 0;
  border: 1px solid rgba(0,0,0,0.05);
}
.legend-star-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--gray);
  padding-left: 14px;
  border-left: 1px solid rgba(107,63,160,0.12);
}
.legend-star-icon { color: var(--pink-4); font-size: 13px; }

@media (max-width: 640px) {
  .map-wrap { padding: 18px 14px 16px; border-radius: 14px; }
  .map-title { font-size: 15px; }
  .map-subtitle { font-size: 11px; }
  .muni-label { font-size: 6.4px; }
  .muni-label-bquilla { font-size: 7.4px; }
  .legend-scale { gap: 10px; }
  .legend-item { font-size: 9.5px; }
  .legend-star-item { font-size: 9.5px; padding-left: 10px; }
  .tooltip { min-width: 180px; padding: 11px 13px; }
}
</style>
</head>

    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .trim();
}

const DATOS_NORMALIZADOS = {};
Object.keys(DATOS_MUNICIPIOS).forEach(key => {
  DATOS_NORMALIZADOS[normalizar(key)] = DATOS_MUNICIPIOS[key];
});

function getDato(municipioGeo) {
  return DATOS_NORMALIZADOS[normalizar(municipioGeo)] || null;
}

// ───────── Escala de color institucional ─────────
function colorPorPorcentaje(pct) {
  if (pct === null || pct === undefined) return '#ECE9F0';
  if (pct < 20) return '#FCE9F1';
  if (pct < 30) return '#F8C9DD';
  if (pct < 40) return '#F391B9';
  return '#C24B7E';
}

// ───────── Setup SVG ─────────
const container = document.getElementById('mapa-svg-container');
const width = container.clientWidth || 900;
const height = Math.round(width * 0.78);

const svg = d3.select('#mapa-svg-container')
  .append('svg')
  .attr('viewBox', `0 0 ${width} ${height}`)
  .attr('width', '100%')
  .attr('height', 'auto')
  .style('display', 'block');

const g = svg.append('g');

const projection = d3.geoMercator().fitSize([width - 24, height - 24], GEO_DATA);
const path = d3.geoPath().projection(projection);

// translate group to add small padding
g.attr('transform', 'translate(12,12)');

const tooltip = d3.select('#tooltip');

// ───────── Dibujar municipios ─────────
const municipiosGroup = g.append('g').attr('class', 'municipios-layer');

municipiosGroup.selectAll('path.municipio-path')
  .data(GEO_DATA.features)
  .enter()
  .append('path')
  .attr('class', d => {
    const dato = getDato(d.properties.municipio);
    return 'municipio-path' + (!dato || dato.pct === null ? ' municipio-sin-dato' : '');
  })
  .attr('d', path)
  .attr('fill', d => {
    const dato = getDato(d.properties.municipio);
    return dato ? colorPorPorcentaje(dato.pct) : '#ECE9F0';
  })
  .on('mousemove', function(event, d) {
    const dato = getDato(d.properties.municipio);
    showTooltip(event, d.properties.municipio, dato);
  })
  .on('mouseleave', function() {
    tooltip.classed('visible', false);
  });

// ───────── Estrellas para alcaldesas ─────────
function starPath(cx, cy, r) {
  const points = [];
  const rInner = r * 0.42;
  for (let i = 0; i < 10; i++) {
    const radius = i % 2 === 0 ? r : rInner;
    const angle = (Math.PI / 5) * i - Math.PI / 2;
    points.push([cx + radius * Math.cos(angle), cy + radius * Math.sin(angle)]);
  }
  return 'M' + points.map(p => p.join(',')).join('L') + 'Z';
}

const starsGroup = g.append('g').attr('class', 'stars-layer');

GEO_DATA.features.forEach(d => {
  const dato = getDato(d.properties.municipio);
  if (dato && dato.alcaldesa) {
    const centroid = path.centroid(d);
    if (!isNaN(centroid[0])) {
      starsGroup.append('path')
        .attr('class', 'star-icon')
        .attr('d', starPath(centroid[0], centroid[1] - 9, 4.5))
        .attr('fill', '#ffffff')
        .attr('stroke', '#C24B7E')
        .attr('stroke-width', 0.6);
    }
  }
});

// ───────── Etiquetas de municipios ─────────
const labelsGroup = g.append('g').attr('class', 'labels-layer');

labelsGroup.selectAll('text.muni-label')
  .data(GEO_DATA.features)
  .enter()
  .append('text')
  .attr('class', d => 'muni-label' + (d.properties.municipio === 'Barranquilla' ? ' muni-label-bquilla' : ''))
  .attr('x', d => path.centroid(d)[0])
  .attr('y', d => {
    const dato = getDato(d.properties.municipio);
    return path.centroid(d)[1] + (dato && dato.alcaldesa ? 6 : 2);
  })
  .text(d => d.properties.municipio)
  .style('pointer-events', 'none');

// ───────── Tooltip content ─────────
function showTooltip(event, nombreMunicipio, dato) {
  let html = '';

  if (!dato || dato.pct === null) {
    html = `
      <div class="tooltip-title">${nombreMunicipio}</div>
      <div class="tooltip-divider"></div>
      <div class="tooltip-nodata">Dato no disponible para este municipio.</div>
    `;
  } else {
    const estrella = dato.alcaldesa ? '<span class="tt-star">★</span>' : '';
    html = `
      <div class="tooltip-title">${estrella}${nombreMunicipio}</div>
      <div class="tooltip-divider"></div>
      <div class="tooltip-section-label">Representación política femenina</div>
      <div class="tooltip-row">
        <span>Mujeres en el Concejo Municipal</span>
        <span class="val">${dato.pct}%</span>
      </div>
      ${dato.curules_m !== null ? `<div class="tooltip-row"><span>Curules</span><span class="val">${dato.curules_m} de ${dato.curules_t}</span></div>` : ''}
      <div class="tooltip-divider"></div>
      <div class="tooltip-section-label">Alcaldía</div>
      <div class="tooltip-alcaldia">${dato.alcaldesa ? 'Alcaldesa' : 'Alcalde'}</div>
      ${dato.alcaldesa ? '<div class="tooltip-leadership">Liderazgo femenino en la administración municipal.</div>' : ''}
    `;
  }

  tooltip.html(html).classed('visible', true);

  const wrapRect = document.querySelector('.map-wrap').getBoundingClientRect();
  const tooltipNode = tooltip.node();
  const tw = tooltipNode.offsetWidth || 220;
  const th = tooltipNode.offsetHeight || 100;

  let left = event.clientX - wrapRect.left + 16;
  let top = event.clientY - wrapRect.top - th / 2;

  if (left + tw > wrapRect.width - 8) {
    left = event.clientX - wrapRect.left - tw - 16;
  }
  if (top < 8) top = 8;
  if (top + th > wrapRect.height - 8) top = wrapRect.height - th - 8;

  tooltip.style('left', left + 'px').style('top', top + 'px');
}

// ───────── Zoom y pan ─────────
const zoomBehavior = d3.zoom()
  .scaleExtent([1, 8])
  .on('zoom', (event) => {
    g.attr('transform', event.transform);
  });

svg.call(zoomBehavior);

document.getElementById('zoom-in').addEventListener('click', () => {
  svg.transition().duration(250).call(zoomBehavior.scaleBy, 1.4);
});
document.getElementById('zoom-out').addEventListener('click', () => {
  svg.transition().duration(250).call(zoomBehavior.scaleBy, 0.7);
});
document.getElementById('zoom-reset').addEventListener('click', () => {
  svg.transition().duration(350).call(zoomBehavior.transform, d3.zoomIdentity);
});

// ───────── Responsive redibujado ─────────
let resizeTimeout;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(() => {
    location.reload();
  }, 400);
});
</script>

</body>
</html>
